<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupplyChain AI — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #0d1117;
      --ink-2: #3d4451;
      --ink-3: #8892a4;
      --surface: #ffffff;
      --surface-2: #f4f6fb;
      --accent: #2454ff;
      --accent-hover: #1a3fd4;
      --accent-glow: rgba(36, 84, 255, 0.18);
      --success: #00c27c;
      --danger: #ff4757;
      --border: #e2e8f0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface-2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ─── TOP BRAND ──────────────────────────────────── */
    .top-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .brand-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }

    .brand-name span { color: var(--accent); }

    /* ─── CARD ───────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 520px;
      padding: 44px 48px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 32px; }

    .card-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    .card-header p { font-size: 14px; color: var(--ink-3); }

    /* ─── ROLE SELECTION ─────────────────────────────── */
    .role-section { margin-bottom: 28px; }

    .role-section label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 10px;
    }

    .role-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-option {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .role-option:hover {
      border-color: var(--accent);
      background: rgba(36,84,255,0.03);
    }

    .role-option.selected {
      border-color: var(--accent);
      background: rgba(36,84,255,0.06);
    }

    .role-option input[type="radio"] { display: none; }

    .role-emoji-box {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 8px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: background 0.2s;
    }

    .role-option.selected .role-emoji-box { background: rgba(36,84,255,0.12); }

    .role-info strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1px;
    }

    .role-info span { font-size: 11px; color: var(--ink-3); }

    /* ─── FORM FIELDS ────────────────────────────────── */
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 13px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--ink-3); stroke-width: 1.8; fill: none;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      height: 44px;
      padding: 0 13px 0 38px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      background: white;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .form-group input::placeholder { color: var(--ink-3); }

    .error-inline {
      font-size: 12px;
      color: var(--danger);
      margin-top: 5px;
      display: none;
    }

    .error-inline.show { display: block; }

    /* ─── PASSWORD STRENGTH ──────────────────────────── */
    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
      width: 0;
    }

    .strength-label {
      font-size: 11px;
      margin-top: 4px;
      color: var(--ink-3);
    }

    /* ─── TERMS ──────────────────────────────────────── */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--ink-3);
    }

    .terms-row input { margin-top: 2px; accent-color: var(--accent); }

    .terms-row a { color: var(--accent); text-decoration: none; }
    .terms-row a:hover { text-decoration: underline; }

    /* ─── BUTTONS ────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--accent);
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      font-size: 13px; color: var(--ink-3);
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .btn-google {
      width: 100%;
      height: 46px;
      background: white;
      color: var(--ink-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-google:hover {
      background: var(--surface-2);
      border-color: #adb5c4;
    }

    .signin-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--ink-3);
    }

    .signin-link a { color: var(--accent); font-weight: 500; text-decoration: none; }
    .signin-link a:hover { text-decoration: underline; }

    /* manufacturer extra field */
    .manufacturer-fields { display: none; }
    .manufacturer-fields.show { display: block; }

    @media (max-width: 560px) {
      .card { padding: 32px 24px; }
      .form-row-2 { grid-template-columns: 1fr; }
      .role-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a class="top-brand" href="login.html">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <span class="brand-name">Supply<span>Chain</span> AI</span>
  </a>

  <div class="card">
    <div class="card-header">
      <h2>Create your account</h2>
      <p>Join the platform as a dropshipper or manufacturer</p>
    </div>

    <!-- ROLE SELECTION -->
    <div class="role-section">
      <label>I am joining as a…</label>
      <div class="role-options">
        <label class="role-option selected" id="role-dropshipper">
          <input type="radio" name="role" value="dropshipper" checked onchange="selectRole(this)" />
          <div class="role-emoji-box">🛒</div>
          <div class="role-info">
            <strong>Dropshipper</strong>
            <span>Find & order from suppliers</span>
          </div>
        </label>
        <label class="role-option" id="role-manufacturer">
          <input type="radio" name="role" value="manufacturer" onchange="selectRole(this)" />
          <div class="role-emoji-box">🏭</div>
          <div class="role-info">
            <strong>Manufacturer</strong>
            <span>List products & fulfill orders</span>
          </div>
        </label>
      </div>
    </div>

    <form id="registerForm">
      <div class="form-row-2">
        <div class="form-group">
          <label>First Name</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="firstName" placeholder="John" required />
          </div>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="lastName" placeholder="Doe" required />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
      </div>

      <!-- Manufacturer-only: company name -->
      <div class="form-group manufacturer-fields" id="companyField">
        <label>Company / Business Name</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <input type="text" id="companyName" placeholder="e.g. Acme Manufacturing Ltd." />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password" oninput="checkStrength(this.value)" />
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel">Enter a password</div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>
        <p class="error-inline" id="passwordError">Passwords do not match.</p>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required />
        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
      </div>

      <button type="submit" class="btn-primary">Create Account →</button>
    </form>

    <div class="divider">or</div>

    <button type="button" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <p class="signin-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script>
    function selectRole(radio) {
      document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
      radio.closest('.role-option').classList.add('selected');
      const companyField = document.getElementById('companyField');
      if (radio.value === 'manufacturer') {
        companyField.classList.add('show');
        document.getElementById('companyName').required = true;
      } else {
        companyField.classList.remove('show');
        document.getElementById('companyName').required = false;
      }
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const map = [
        { pct: '0%',   color: '#e2e8f0', text: 'Enter a password' },
        { pct: '25%',  color: '#ff4757', text: 'Weak' },
        { pct: '50%',  color: '#ffaa00', text: 'Fair' },
        { pct: '75%',  color: '#2454ff', text: 'Good' },
        { pct: '100%', color: '#00c27c', text: 'Strong ✓' },
      ];
      fill.style.width = map[score].pct;
      fill.style.background = map[score].color;
      label.textContent = val.length === 0 ? 'Enter a password' : map[score].text;
      label.style.color = val.length === 0 ? '#8892a4' : map[score].color;
    }

    document.getElementById('confirmPassword').addEventListener('blur', function() {
      const pw = document.getElementById('password').value;
      const err = document.getElementById('passwordError');
      err.classList.toggle('show', this.value && this.value !== pw);
    });

    document.getElementById('confirmPassword').addEventListener('input', function() {
      document.getElementById('passwordError').classList.remove('show');
    });

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      const err = document.getElementById('passwordError');
      if (pw !== cpw) { err.classList.add('show'); return; }
      err.classList.remove('show');
      // TODO: connect to backend
      alert('Account created! (Connect to your backend)');
    });
  </script>
</body>
</html>
